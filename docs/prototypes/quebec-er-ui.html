<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quebec ER Virtual Waiting Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-0: #f4f8f8;
        --bg-1: #e7f4f2;
        --card: #ffffff;
        --ink: #102220;
        --muted: #4c6763;
        --accent: #0f766e;
        --accent-2: #f97316;
        --line: #d8e7e4;
        --ok: #0f9c5c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(1200px 700px at 15% -10%, #d9f2ef 0%, transparent 55%),
          radial-gradient(900px 700px at 100% 0%, #ffe4cf 0%, transparent 55%),
          linear-gradient(180deg, var(--bg-0), var(--bg-1));
      }

      .shell {
        max-width: 1180px;
        margin: 28px auto;
        padding: 0 16px;
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 14px;
      }

      .panel,
      .chat {
        background: color-mix(in srgb, var(--card) 90%, white);
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: 0 12px 40px rgba(16, 34, 32, 0.06);
      }

      .panel {
        padding: 18px;
      }

      .title {
        margin: 0 0 2px;
        font-size: 1.12rem;
        font-weight: 700;
      }

      .sub {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        padding: 8px 12px;
        margin-bottom: 12px;
        background: #ecfdf5;
        color: var(--ok);
        font-weight: 600;
        font-size: 0.84rem;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
        margin-top: 10px;
        background: #fcfffe;
      }

      .label {
        color: var(--muted);
        font-size: 0.78rem;
        letter-spacing: 0.02em;
      }

      .value {
        margin-top: 2px;
        font-weight: 600;
      }

      .chat {
        display: grid;
        grid-template-rows: auto 1fr auto;
        overflow: hidden;
      }

      .chat-head {
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .chat-head h1 {
        margin: 0;
        font-size: 1rem;
      }

      .badge {
        border-radius: 10px;
        padding: 6px 10px;
        background: #e2f3f1;
        color: #0d5e58;
        font-size: 0.78rem;
        font-weight: 700;
      }

      .messages {
        padding: 16px;
        overflow: auto;
        max-height: 68vh;
      }

      .msg {
        width: fit-content;
        max-width: 82%;
        padding: 12px 13px;
        border-radius: 14px;
        margin: 10px 0;
        line-height: 1.35;
        animation: rise 220ms ease;
      }

      .msg.user {
        margin-left: auto;
        background: #0f766e;
        color: #f8fffe;
        border-bottom-right-radius: 4px;
      }

      .msg.bot {
        background: #ffffff;
        border: 1px solid var(--line);
        border-bottom-left-radius: 4px;
      }

      .mini-list {
        margin: 8px 0 0;
        padding-left: 18px;
      }

      .composer {
        border-top: 1px solid var(--line);
        padding: 12px;
        display: grid;
        gap: 10px;
      }

      .chips {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .chip {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 0.8rem;
        cursor: pointer;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      input {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px 14px;
        font-family: inherit;
        font-size: 0.95rem;
      }

      button.send {
        border: none;
        border-radius: 12px;
        padding: 0 14px;
        background: linear-gradient(140deg, var(--accent), #0b5f58);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }

      @keyframes rise {
        from {
          transform: translateY(4px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      @media (max-width: 980px) {
        .shell {
          grid-template-columns: 1fr;
        }
        .messages {
          max-height: 58vh;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <aside class="panel">
        <h2 class="title">Virtual Waiting Room</h2>
        <p class="sub">Quebec non-urgent emergency assistant</p>
        <div class="pill">Online: Supervisor + Live ER Feed</div>

        <div class="card">
          <div class="label">Mode</div>
          <div class="value">Account + Triage Workflow</div>
        </div>
        <div class="card">
          <div class="label">Context</div>
          <div class="value">No patient context loaded at startup</div>
        </div>
        <div class="card">
          <div class="label">Next Step</div>
          <div class="value">Choose login or account creation</div>
        </div>
      </aside>

      <section class="chat">
        <header class="chat-head">
          <h1>ER Chat</h1>
          <span class="badge">Concise Mode</span>
        </header>

        <div class="messages" id="messages"></div>

        <div class="composer">
          <div class="chips">
            <button class="chip" data-chip="Log in">Log in</button>
            <button class="chip" data-chip="Create account">Create account</button>
            <button class="chip" data-chip="I want symptom assessment">Symptom Check</button>
            <button class="chip" data-chip="Show closest ER options">Closest ER</button>
            <button class="chip" data-chip="Enroll me in waitlist option 1">Join Waitlist</button>
          </div>
          <div class="row">
            <input id="prompt" placeholder="Type message..." />
            <button class="send" id="sendBtn">Send</button>
          </div>
        </div>
      </section>
    </main>

    <script>
      const APP_CONFIG = {
        // Replace with your real API bridge/backend endpoint.
        // Example: "/api/chat"
        apiUrl: "",
      };

      const messagesEl = document.getElementById("messages");
      const inputEl = document.getElementById("prompt");
      const sendBtn = document.getElementById("sendBtn");

      const state = {
        messages: [
          {
            role: "bot",
            text:
              "Welcome to the Quebec ER Virtual Waiting Room. To begin, choose: 1) Log in, or 2) Create account.",
          },
        ],
        mode: null,
        regIndex: -1,
        registration: {},
        symptomIndex: -1,
        symptoms: {},
      };

      const REG_FIELDS = [
        { key: "email", label: "Email" },
        { key: "password", label: "Password" },
        { key: "full_name", label: "Full name" },
        { key: "date_of_birth", label: "Date of birth (YYYY-MM-DD)" },
        { key: "sex", label: "Sex (M/F/Other)" },
        { key: "phone", label: "Phone number" },
        { key: "address", label: "Address" },
        { key: "height_cm", label: "Height (cm)" },
        { key: "weight_kg", label: "Weight (kg)" },
        { key: "blood_type", label: "Blood type" },
        { key: "ramq", label: "RAMQ number" },
        { key: "allergies", label: "Allergies" },
        { key: "antecedents", label: "Medical antecedents" },
        { key: "emergency_contact_name", label: "Emergency contact name" },
        { key: "emergency_contact_phone", label: "Emergency contact phone" },
      ];

      const SYMPTOM_FIELDS = [
        { key: "main_symptom", label: "What are your main symptoms?" },
        { key: "onset", label: "When did symptoms start?" },
        { key: "severity", label: "How severe is it (0-10)?" },
        { key: "progression", label: "Are symptoms getting worse, same, or improving?" },
        { key: "associated", label: "Any associated symptoms (nausea, vomiting, blurred vision, confusion, fever, etc.)?" },
        { key: "loc_or_injury", label: "Where is the pain/problem located, or what part was injured?" },
        { key: "loss_of_consciousness", label: "Did you lose consciousness at any point?" },
        { key: "risk_factors", label: "Any important medical factors now (pregnancy, blood thinners, diabetes, asthma, heart issues)?" },
      ];

      function render() {
        messagesEl.innerHTML = "";
        for (const m of state.messages) {
          const div = document.createElement("div");
          div.className = `msg ${m.role === "user" ? "user" : "bot"}`;
          if (Array.isArray(m.list)) {
            div.innerHTML = `${m.text}<ol class="mini-list">${m.list
              .map((x) => `<li>${x}</li>`)
              .join("")}</ol>`;
          } else {
            div.textContent = m.text;
          }
          messagesEl.appendChild(div);
        }
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function callBackend(userMessage) {
        // TODO: Replace with real fetch(APP_CONFIG.apiUrl, ...)
        // Minimal local mock to speed design/demo.
        const q = userMessage.toLowerCase();

        if (state.mode === "register_collect") {
          const current = REG_FIELDS[state.regIndex];
          state.registration[current.key] = userMessage.trim();
          state.regIndex += 1;

          if (state.regIndex < REG_FIELDS.length) {
            const next = REG_FIELDS[state.regIndex];
            return { text: `${next.label}:` };
          }

          state.mode = "symptom_collect";
          state.symptomIndex = 0;
          state.symptoms = {};
          return {
            text:
              "Thanks. Registration details collected. Let’s start symptom assessment.\n\nWhat are your main symptoms?",
          };
        }

        if (state.mode === "symptom_collect") {
          const current = SYMPTOM_FIELDS[state.symptomIndex];
          state.symptoms[current.key] = userMessage.trim();
          state.symptomIndex += 1;

          if (state.symptomIndex < SYMPTOM_FIELDS.length) {
            const next = SYMPTOM_FIELDS[state.symptomIndex];
            return { text: next.label };
          }

          state.mode = "symptom_done";
          return {
            text:
              "Closest ER options\n1) CHUM - Hôpital Saint-Luc — 1.7 km — ~92 min wait\n2) Hôpital Charles-Le Moyne — 7.1 km — ~289 min wait\n3) Hôpital Barrie Mémorial — 53.5 km — ~325 min wait\n\nReply with 1/2/3 to choose a hospital.",
          };
        }

        if (state.mode === "symptom_done") {
          const choice = userMessage.trim();
          if (choice === "1") {
            state.mode = "waitlist_done";
            return {
              text:
                "Enrolled at CHUM - Hôpital Saint-Luc. Queue position #2. Estimated wait ~92 min. Total ETA ~95 min.",
            };
          }
          if (choice === "2") {
            state.mode = "waitlist_done";
            return {
              text:
                "Enrolled at Hôpital Charles-Le Moyne. Queue position #4. Estimated wait ~289 min. Total ETA ~301 min.",
            };
          }
          if (choice === "3") {
            state.mode = "waitlist_done";
            return {
              text:
                "Enrolled at Hôpital Barrie Mémorial. Queue position #3. Estimated wait ~325 min. Total ETA ~417 min.",
            };
          }
          return { text: "Please reply with 1, 2, or 3 to choose a hospital." };
        }

        if (q.includes("log in") || q.includes("login") || q === "1") {
          return {
            text:
              "Please provide your email, password, and current location text (for example: McGill University).",
          };
        }
        if (q.includes("create") || q.includes("account") || q === "2") {
          state.mode = "register_collect";
          state.regIndex = 0;
          state.registration = {};
          return {
            text: `${REG_FIELDS[0].label}:`,
          };
        }
        if (q.includes("closest") || q.includes("er")) {
          return {
            text: "Closest ER options",
            list: [
              "CHUM - Hôpital Saint-Luc — 1.7 km — ~92 min wait",
              "Hôpital Charles-Le Moyne — 7.1 km — ~289 min wait",
              "Hôpital Barrie Mémorial — 53.5 km — ~325 min wait",
            ],
          };
        }
        if (q.includes("waitlist") || q.includes("enroll")) {
          return {
            text:
              "Enrolled at CHUM - Hôpital Saint-Luc. Queue position #2. Estimated wait ~92 min. Total ETA ~95 min.",
          };
        }
        if (q.includes("symptom")) {
          return {
            text: "Please answer these 4 questions:",
            list: [
              "Did you lose consciousness, even briefly?",
              "Do you currently have vomiting or blurred vision?",
              "How severe is your headache (0-10)?",
              "Are symptoms getting worse, same, or improving?",
            ],
          };
        }
        return { text: "Noted. I can run symptom check, closest ER list, or waitlist enrollment." };
      }

      async function sendMessage(text) {
        const msg = text.trim();
        if (!msg) return;
        state.messages.push({ role: "user", text: msg });
        render();
        inputEl.value = "";

        const response = await callBackend(msg);
        state.messages.push({ role: "bot", ...response });
        render();
      }

      sendBtn.addEventListener("click", () => sendMessage(inputEl.value));
      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage(inputEl.value);
      });

      document.querySelectorAll("[data-chip]").forEach((chip) => {
        chip.addEventListener("click", () => sendMessage(chip.getAttribute("data-chip")));
      });

      render();
    </script>
  </body>
</html>
