bundle:
  name: salleq_symptom_routing_agent

workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

targets:
  dev:
    default: true
    workspace:
      host: https://<your-workspace>.cloud.databricks.com

sync:
  include:
    - ../../README.md
    - ../../requirements.txt
    - ../../docs/ai_dev_kit/**
    - ../../sql/symptom_routing/**
    - ../../src/symptom_routing/**
    - ../../notebooks/symptom_routing/**
    - ../../tests/symptom_routing/**
    - ../../data/simulated_cases_seed.jsonl
